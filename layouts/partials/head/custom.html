<style>
/* ============================================================
   Particle Stars Canvas — positioning & transition
   Injected via layouts/partials/head/custom.html
   ============================================================ */

#particle-stars {
    position: fixed;
    inset: 0;
    z-index: -1;
    width: 100%;
    height: 100%;
    pointer-events: none;
    /* smooth fade when canvas is first painted */
    opacity: 0;
    animation: particle-stars-fade-in 1.8s ease-out forwards;
}

@keyframes particle-stars-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
}
</style>
